<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARKELINE 経理書類アップロード</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
  :root{--bg:#f5f5f0;--surface:#fff;--border:#e0dfd8;--border2:#c8c7be;--text:#1a1a18;--text2:#6b6b64;--text3:#9b9b92;--accent:#1a4fd6;--accent-bg:#eef2fd;--success:#0a7c4f;--success-bg:#eaf5f0;--danger:#c0392b;--danger-bg:#fdf0ee;--shadow:0 2px 12px rgba(0,0,0,.06);--shadow2:0 4px 24px rgba(0,0,0,.10);--radius:10px;--radius-sm:6px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
  .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px}
  .logo-mark{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;color:white;font-size:14px}
  .user-info{display:flex;align-items:center;gap:8px;font-size:13px}
  .user-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0;overflow:hidden}
  .user-avatar img{width:100%;height:100%;object-fit:cover}
  .btn-signout{padding:3px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:white;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit}
  .btn-signout:hover{background:var(--bg)}

  /* ログイン画面 */
  .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
  .login-card{background:white;border:1px solid var(--border);border-radius:16px;padding:3rem 2.5rem;text-align:center;max-width:400px;width:90%;box-shadow:var(--shadow2)}
  .login-logo{width:56px;height:56px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;color:white;margin:0 auto 1.5rem}
  .login-title{font-size:20px;font-weight:700;margin-bottom:8px}
  .login-sub{font-size:13px;color:var(--text2);margin-bottom:2rem;line-height:1.7}
  .btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 20px;border:1.5px solid var(--border2);border-radius:var(--radius);background:white;color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .btn-google:hover{background:var(--bg);box-shadow:var(--shadow)}
  .btn-google:disabled{opacity:.5;cursor:not-allowed}
  .btn-google svg{width:18px;height:18px;flex-shrink:0}
  .login-status{font-size:13px;color:var(--text3);margin-top:1rem;min-height:20px}

  .main{max-width:720px;margin:0 auto;padding:2rem 1.5rem}
  .tabs{display:flex;border-bottom:1.5px solid var(--border);margin-bottom:1.5rem}
  .tab{padding:10px 20px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:all .15s;font-family:inherit}
  .tab.on{color:var(--accent);border-bottom-color:var(--accent)}
  .tab:hover:not(.on){color:var(--text)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1rem;box-shadow:var(--shadow)}
  .card-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
  .ftree{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .fcols{display:grid;grid-template-columns:1fr 1fr 1fr}
  .fcol{border-right:1px solid var(--border)}
  .fcol:last-child{border-right:none}
  .fhead{font-size:11px;font-weight:700;color:var(--text3);padding:8px 12px;background:var(--bg);border-bottom:1px solid var(--border);letter-spacing:.05em;text-transform:uppercase}
  .fcol-body{max-height:280px;overflow-y:auto}
  .fi{display:flex;align-items:center;gap:7px;padding:8px 12px;cursor:pointer;font-size:13px;color:var(--text2);transition:background .1s;border-bottom:1px solid var(--border);line-height:1.4}
  .fi:last-child{border-bottom:none}
  .fi:hover{background:var(--bg);color:var(--text)}
  .fi.on{background:var(--accent-bg);color:var(--accent);font-weight:500}
  .fhint{padding:12px;font-size:13px;color:var(--text3);text-align:center}
  .fok{padding:12px;font-size:13px;color:var(--success);text-align:center}
  .fresult{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;margin-top:10px;min-height:40px;color:var(--text2)}
  .fresult.set{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
  .path{font-family:'DM Mono',monospace;font-size:12px;word-break:break-all}
  .dz{border:2px dashed var(--border2);border-radius:var(--radius);padding:2rem;text-align:center;cursor:pointer;background:var(--bg);position:relative;transition:all .2s}
  .dz:hover,.dz.over{border-color:var(--accent);background:var(--accent-bg)}
  .dz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .dz-icon{font-size:32px;margin-bottom:8px}
  .dz-text{font-size:14px;color:var(--text2);font-weight:500}
  .dz-sub{font-size:12px;color:var(--text3);margin-top:4px}
  .fl{margin-top:10px;display:flex;flex-direction:column;gap:6px}
  .fitem{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px}
  .fitem-icon{font-size:18px;color:var(--accent);flex-shrink:0}
  .fitem-info{flex:1;min-width:0}
  .fitem-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fitem-meta{font-size:12px;color:var(--text3)}
  .fitem-status.done{color:var(--success);font-size:12px;font-weight:500}
  .fitem-status.error{color:var(--danger);font-size:12px;font-weight:500}
  .frm{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px;border-radius:4px;flex-shrink:0}
  .frm:hover{color:var(--danger);background:var(--danger-bg)}
  .pb{height:3px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:5px}
  .pf{height:100%;background:var(--accent);border-radius:99px;transition:width .4s}
  .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:white;color:var(--text);transition:all .15s;font-family:inherit}
  .btn:hover{background:var(--bg)}
  .btn.pri{background:var(--accent);color:white;border-color:var(--accent)}
  .btn.pri:hover{opacity:.9}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  textarea{width:100%;height:60px;resize:vertical;font-size:14px;font-family:inherit;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
  textarea:focus{border-color:var(--accent);background:white}
  .toast-wrap{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
  .toast{padding:12px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow2);animation:slideIn .3s ease;max-width:320px}
  .toast.ok{background:var(--success);color:white}
  .toast.err{background:var(--danger);color:white}
  @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .sg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
  .sc{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;box-shadow:var(--shadow)}
  .sl{font-size:12px;color:var(--text3);margin-bottom:4px}
  .sv{font-size:22px;font-weight:700;color:var(--text)}
  .fbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .fbar select,.fbar input{font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:white;color:var(--text);font-family:inherit;outline:none}
  .fbar input{flex:1;min-width:100px}
  .hi{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
  .hi:last-child{border-bottom:none}
  .hav{width:34px;height:34px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;flex-shrink:0;overflow:hidden}
  .hav img{width:100%;height:100%;object-fit:cover}
  .hb{flex:1;min-width:0}
  .ht{font-size:14px;font-weight:600;color:var(--text)}
  .hm{font-size:12px;color:var(--text3);margin-top:3px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .hp{font-size:12px;color:var(--text2);margin-top:4px;font-family:'DM Mono',monospace;word-break:break-all}
  .hfs{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px}
  .chip{font-size:12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:2px 8px;color:var(--text2)}
  .badge{display:inline-flex;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
  .badge.ok{background:var(--success-bg);color:var(--success)}
  .badge.err{background:var(--danger-bg);color:var(--danger)}
  .empty{text-align:center;padding:3rem;color:var(--text3)}
  .sp{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:600px){.fcols{grid-template-columns:1fr}.fcol{border-right:none;border-bottom:1px solid var(--border)}.sg{grid-template-columns:1fr 1fr}.header{padding:0 1rem}.main{padding:1.25rem 1rem}}
</style>
</head>

<!-- ログイン画面 -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">📁</div>
    <div class="login-title">経理書類アップロード</div>
    <div class="login-sub">MARKELINEの経理書類を<br>Google Driveへ安全にアップロード</div>
    <button class="btn-google" id="btn-login" onclick="signIn()" disabled>
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Googleアカウントでログイン
    </button>
    <div class="login-status" id="login-status">読み込み中...</div>
  </div>
</div>

<!-- メインアプリ -->
<div id="app-screen" style="display:none">
  <header class="header">
    <div class="logo">
      <div class="logo-mark">📁</div>
      MARKELINE 経理アップロード
    </div>
    <div class="user-info">
      <div class="user-avatar" id="header-avatar"></div>
      <span id="header-name" style="font-weight:500;color:var(--text)"></span>
      <button class="btn-signout" onclick="signOut()">ログアウト</button>
    </div>
  </header>
  <main class="main">
    <div class="tabs">
      <button class="tab on" id="tb-up" onclick="sw('up')">📤 アップロード</button>
      <button class="tab" id="tb-hi" onclick="sw('hi')">📋 チーム履歴</button>
    </div>
    <div id="pane-up">
      <div class="card">
        <div class="card-title">保存先フォルダを選択</div>
        <div class="ftree">
          <div class="fcols">
            <div class="fcol"><div class="fhead">月</div><div class="fcol-body" id="c1"></div></div>
            <div class="fcol"><div class="fhead">カテゴリ</div><div class="fcol-body" id="c2"></div></div>
            <div class="fcol"><div class="fhead">詳細</div><div class="fcol-body" id="c3"></div></div>
          </div>
        </div>
        <div class="fresult" id="fresult">📁 <span style="color:var(--text3)">月・カテゴリを選択してください</span></div>
      </div>
      <div class="card">
        <div class="card-title">メモ（任意）</div>
        <textarea id="memo" placeholder="取引先名・補足など"></textarea>
      </div>
      <div class="card">
        <div class="card-title">ファイル選択</div>
        <div class="dz" id="dz" ondragover="doDrag(event)" ondragleave="doLeave(event)" ondrop="doDrop(event)">
          <input type="file" id="fi" multiple onchange="onFiles(event)">
          <div class="dz-icon">☁️</div>
          <div class="dz-text">ドロップまたはクリックしてファイルを選択</div>
          <div class="dz-sub">PDF・画像・Excel・Word・CSV など 最大50MB</div>
        </div>
        <div class="fl" id="fl"></div>
      </div>
      <div class="actions">
        <button class="btn" onclick="clearAll()">🗑 クリア</button>
        <button class="btn pri" id="upbtn" onclick="doUp()" disabled>📤 アップロード</button>
      </div>
    </div>
    <div id="pane-hi" style="display:none">
      <div class="sg" id="stats"></div>
      <div class="fbar">
        <select id="f1" onchange="renderH()"><option value="">全月</option></select>
        <select id="f2" onchange="renderH()"><option value="">全カテゴリ</option></select>
        <select id="f3" onchange="renderH()"><option value="">全スタッフ</option></select>
        <input type="text" id="fq" placeholder="メモ・パスで検索..." oninput="renderH()">
        <button class="btn" onclick="loadH()" style="padding:6px 12px">🔄</button>
      </div>
      <div class="card"><div id="hlist"></div></div>
    </div>
  </main>
</div>
<div class="toast-wrap" id="tw"></div>

let tokenClient=null,accessToken=null,currentUser=null;
let selM=null,selC=null,selS=null,files=[],hist=[];
let tokenExpiry=0;

// ---- Google認証（サイレント自動更新） ----
function loadGoogleScript(){
  return new Promise((resolve,reject)=>{
    const script=document.createElement('script');
    script.src='https://accounts.google.com/gsi/client';
    script.onload=()=>{
      const check=setInterval(()=>{
        if(typeof google!=='undefined'&&google.accounts?.oauth2){clearInterval(check);resolve();}
      },100);
      setTimeout(()=>{clearInterval(check);reject(new Error('timeout'));},10000);
    };
    script.onerror=reject;
    document.head.appendChild(script);
  });
}

async function initAuth(){
  try{
    await loadGoogleScript();
    tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:CLIENT_ID,
      scope:SCOPES,
      callback:(resp)=>{
        if(resp.error){
          setStatus('ログインが必要です');
          document.getElementById('btn-login').disabled=false;
          return;
        }
        accessToken=resp.access_token;
        tokenExpiry=Date.now()+(55*60*1000); // 55分
        fetchUserInfo();
      }
    });
    // サイレントログイン試行（ユーザーに画面を見せずに自動認証）
    setStatus('自動ログインを試みています...');
    tokenClient.requestAccessToken({prompt:''});
  }catch(e){
    setStatus('読み込みエラー。ページを再読み込みしてください。');
    console.error(e);
  }
}

// トークンが切れそうなら自動更新
async function ensureToken(){
  if(accessToken && Date.now() < tokenExpiry) return;
  // サイレントで再取得
  return new Promise((resolve,reject)=>{
    const origCallback=tokenClient.callback;
    tokenClient.callback=(resp)=>{
      tokenClient.callback=origCallback;
      if(resp.error){reject(new Error(resp.error));return;}
      accessToken=resp.access_token;
      tokenExpiry=Date.now()+(55*60*1000);
      resolve();
    };
    tokenClient.requestAccessToken({prompt:''});
  });
}

function signIn(){
  if(!tokenClient)return;
  tokenClient.requestAccessToken({prompt:'select_account'});
}

function signOut(){
  if(accessToken)google.accounts.oauth2.revoke(accessToken,()=>{});
  accessToken=null;currentUser=null;tokenExpiry=0;
  document.getElementById('app-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('btn-login').disabled=false;
  setStatus('ログアウトしました。再度ログインしてください。');
}

function setStatus(msg){document.getElementById('login-status').textContent=msg;}

async function fetchUserInfo(){
  try{
    const r=await fetch('https://www.googleapis.com/oauth2/v2/userinfo',{headers:{Authorization:`Bearer ${accessToken}`}});
    if(!r.ok)throw new Error('userinfo失敗');
    currentUser=await r.json();
    const av=document.getElementById('header-avatar');
    if(currentUser.picture){av.innerHTML=`<img src="${currentUser.picture}" alt="">`;}
    else{av.textContent=(currentUser.name||'U').slice(0,1);}
    document.getElementById('header-name').textContent=currentUser.name||currentUser.email||'';
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-screen').style.display='block';
    buildC1();buildC2();buildC3();updateResult();
    loadH();
    // 54分後に自動でトークン更新
    setTimeout(()=>ensureToken().catch(()=>{}),54*60*1000);
  }catch(e){
    setStatus('ユーザー情報の取得に失敗しました。ログインしてください。');
    document.getElementById('btn-login').disabled=false;
    console.error(e);
  }
}

// ---- フォルダ選択 ----
function sw(t){
  document.getElementById('pane-up').style.display=t==='up'?'':'none';
  document.getElementById('pane-hi').style.display=t==='hi'?'':'none';
  document.getElementById('tb-up').classList.toggle('on',t==='up');
  document.getElementById('tb-hi').classList.toggle('on',t==='hi');
  if(t==='hi')loadH();
}
function buildC1(){document.getElementById('c1').innerHTML=MONTHS.map(m=>`<div class="fi${selM===m.id?' on':''}" onclick="pickM('${m.id}')">📅 ${esc(m.label)}</div>`).join('');}
function buildC2(){
  const el=document.getElementById('c2');
  if(!selM){el.innerHTML='<div class="fhint">← 月を選択</div>';return;}
  el.innerHTML=CATS.map(c=>{const h=!!(FIDS[selM]&&FIDS[selM][c.key]);return`<div class="fi${selC===c.key?' on':''}" onclick="${h?'pickC(\''+c.key+'\')':''}" style="${!h?'opacity:.3;cursor:not-allowed':''}">📁 ${esc(c.label)}</div>`;}).join('');
}
function buildC3(){
  const el=document.getElementById('c3');
  if(!selM||!selC){el.innerHTML='<div class="fhint">← カテゴリを選択</div>';return;}
  const cat=CATS.find(c=>c.key===selC);
  if(!cat||!cat.subs){el.innerHTML='<div class="fok">✅ サブフォルダなし</div>';return;}
  el.innerHTML=cat.subs.map(s=>`<div class="fi${selS===s.key?' on':''}" onclick="pickS('${s.key}')">📂 ${esc(s.label)}</div>`).join('');
}
function pickM(id){selM=id;selC=null;selS=null;buildC1();buildC2();buildC3();updateResult();updBtn();}
function pickC(key){selC=key;selS=null;buildC2();buildC3();updateResult();updBtn();}
function pickS(key){selS=key;buildC3();updateResult();updBtn();}
function getTargetId(){
  if(!selM||!selC)return null;
  const cat=CATS.find(c=>c.key===selC);
  if(cat&&cat.subs){if(!selS)return null;return FIDS[selM]?.[selS]||null;}
  return FIDS[selM]?.[selC]||null;
}
function getPath(){
  const tid=getTargetId();if(!tid)return null;
  const m=MONTHS.find(x=>x.id===selM),cat=CATS.find(x=>x.key===selC);
  if(cat&&cat.subs&&selS){const sub=cat.subs.find(s=>s.key===selS);return`第5期2 / ${m.label} / ${cat.label} / ${sub.label}`;}
  return`第5期2 / ${m.label} / ${cat.label}`;
}
function updateResult(){
  const el=document.getElementById('fresult'),path=getPath();
  if(path){el.className='fresult set';el.innerHTML=`✅ <span class="path">${esc(path)}</span>`;}
  else{el.className='fresult';const cat=CATS.find(c=>c.key===selC);const msg=!selM?'月・カテゴリを選択してください':!selC?'カテゴリを選択してください':(cat&&cat.subs&&!selS)?'詳細フォルダを選択してください':'月・カテゴリを選択してください';el.innerHTML=`📁 <span style="color:var(--text3)">${msg}</span>`;}
}
function updBtn(){document.getElementById('upbtn').disabled=!files.length||!getPath()||!accessToken;}

// ---- ファイル操作 ----
function doDrag(e){e.preventDefault();document.getElementById('dz').classList.add('over');}
function doLeave(e){document.getElementById('dz').classList.remove('over');}
function doDrop(e){e.preventDefault();document.getElementById('dz').classList.remove('over');addFiles([...e.dataTransfer.files]);}
function onFiles(e){addFiles([...e.target.files]);}
function addFiles(fs){fs.forEach(f=>{if(f.size>50*1024*1024){toast('err',f.name+' は50MBを超えています');return;}if(!files.find(x=>x.name===f.name&&x.size===f.size))files.push(f);});renderFiles();updBtn();}
function rmFile(i){files.splice(i,1);renderFiles();updBtn();}
function renderFiles(){
  document.getElementById('fl').innerHTML=files.map((f,i)=>`
    <div class="fitem">
      <span class="fitem-icon">📄</span>
      <div class="fitem-info">
        <div class="fitem-name">${esc(f.name)}</div>
        <div class="fitem-meta" id="fmeta${i}">${fmtB(f.size)}</div>
      </div>
      <button class="frm" onclick="rmFile(${i})">✕</button>
    </div>`).join('');
}

// ---- Drive アップロード ----
async function uploadToDrive(file,folderId){
  await ensureToken();
  const metadata={name:file.name,parents:[folderId]};
  const form=new FormData();
  form.append('metadata',new Blob([JSON.stringify(metadata)],{type:'application/json'}));
  form.append('file',file);
  const resp=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name',{
    method:'POST',headers:{Authorization:`Bearer ${accessToken}`},body:form
  });
  if(!resp.ok){const err=await resp.json().catch(()=>({}));throw new Error(err.error?.message||`HTTP ${resp.status}`);}
  return await resp.json();
}

async function doUp(){
  if(!accessToken){toast('err','ログインが必要です');return;}
  const path=getPath(),targetId=getTargetId();
  if(!path||!targetId){toast('err','保存先フォルダを選択してください');return;}
  if(!files.length){toast('err','ファイルを選択してください');return;}
  const btn=document.getElementById('upbtn');
  btn.disabled=true;btn.innerHTML='<div class="sp"></div> アップロード中...';
  const results=[];
  for(let i=0;i<files.length;i++){
    const f=files[i];
    const metaEl=document.getElementById('fmeta'+i);
    if(metaEl)metaEl.innerHTML='<div class="pb"><div class="pf" style="width:60%"></div></div>';
    try{
      const df=await uploadToDrive(f,targetId);
      if(metaEl)metaEl.innerHTML='<span class="fitem-status done">✅ 完了</span>';
      results.push({name:f.name,size:f.size,status:'success',driveId:df.id});
    }catch(e){
      if(metaEl)metaEl.innerHTML=`<span class="fitem-status error">❌ ${esc(e.message)}</span>`;
      results.push({name:f.name,size:f.size,status:'error',error:e.message});
    }
  }
  const ok=results.filter(r=>r.status==='success').length;
  const mLabel=MONTHS.find(x=>x.id===selM)?.label||'';
  const cat=CATS.find(x=>x.key===selC);
  const cLabel=cat?.label||'',sLabel=cat?.subs?.find(s=>s.key===selS)?.label||'';
  const entry={id:Date.now(),ts:new Date().toISOString(),user:currentUser?.name||currentUser?.email||'不明',userPic:currentUser?.picture||'',path,month:mLabel,cat:cLabel,sub:sLabel,memo:document.getElementById('memo').value,files:results};
  hist.unshift(entry);
  try{localStorage.setItem(SKEY,JSON.stringify(hist.slice(0,200)));}catch(e){}
  btn.disabled=false;btn.innerHTML='📤 アップロード';
  if(ok===results.length){toast('ok',`✅ ${ok}件を「${sLabel||cLabel}」に保存しました`);setTimeout(()=>clearAll(),2000);}
  else toast('err',`⚠️ ${ok}/${results.length}件成功（${results.length-ok}件失敗）`);
  updBtn();
}

function clearAll(){files=[];document.getElementById('fi').value='';document.getElementById('memo').value='';renderFiles();updBtn();}

// ---- 履歴 ----
function loadH(){try{hist=JSON.parse(localStorage.getItem(SKEY)||'[]');}catch(e){hist=[];}renderH();renderStats();refreshF();}
function renderStats(){const t=hist.length,f=hist.reduce((s,h)=>s+(h.files?.length||0),0),u=new Set(hist.map(h=>h.user).filter(Boolean)).size;document.getElementById('stats').innerHTML=`<div class="sc"><div class="sl">総アップロード</div><div class="sv">${t}</div></div><div class="sc"><div class="sl">ファイル数</div><div class="sv">${f}</div></div><div class="sc"><div class="sl">担当者数</div><div class="sv">${u}</div></div>`;}
function refreshF(){
  const months=[...new Set(hist.map(h=>h.month).filter(Boolean))],cats=[...new Set(hist.map(h=>h.cat).filter(Boolean))],users=[...new Set(hist.map(h=>h.user).filter(Boolean))];
  ['f1','f2','f3'].forEach((id,i)=>{const arr=[months,cats,users][i],ph=['全月','全カテゴリ','全スタッフ'][i],el=document.getElementById(id),prev=el.value;el.innerHTML=`<option value="">${ph}</option>`+arr.map(v=>`<option${v===prev?' selected':''}>${esc(v)}</option>`).join('');});
}
function renderH(){
  const fm=document.getElementById('f1').value,fc=document.getElementById('f2').value,fu=document.getElementById('f3').value,fq=document.getElementById('fq').value.toLowerCase();
  let items=hist;
  if(fm)items=items.filter(h=>h.month===fm);if(fc)items=items.filter(h=>h.cat===fc);if(fu)items=items.filter(h=>h.user===fu);if(fq)items=items.filter(h=>(h.memo||'').toLowerCase().includes(fq)||(h.path||'').toLowerCase().includes(fq));
  const el=document.getElementById('hlist');
  if(!items.length){el.innerHTML='<div class="empty">📭 該当する履歴がありません</div>';return;}
  el.innerHTML=items.slice(0,50).map(h=>{
    const dt=new Date(h.ts).toLocaleDateString('ja-JP',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const ok=h.files?.filter(f=>f.status==='success').length||0,tot=h.files?.length||0,dest=h.sub||h.cat||'不明';
    const av=h.userPic?`<img src="${h.userPic}" alt="">`:esc((h.user||'?').slice(0,1));
    return`<div class="hi"><div class="hav">${av}</div><div class="hb"><div class="ht">${esc(dest)}</div><div class="hm"><strong>${esc(h.user||'不明')}</strong><span>${esc(h.month||'')}</span><span>${dt}</span><span class="badge ${ok===tot?'ok':'err'}">${ok}/${tot}件</span></div><div class="hp">📁 ${esc(h.path||'')}</div>${h.memo?`<div style="font-size:12px;color:var(--text2);margin-top:4px">💬 ${esc(h.memo)}</div>`:''}<div class="hfs">${(h.files||[]).slice(0,5).map(f=>`<span class="chip">${esc(f.name)}</span>`).join('')}${(h.files?.length||0)>5?`<span class="chip">+${h.files.length-5}件</span>`:''}</div></div></div>`;
  }).join('');
}

function toast(type,msg){const w=document.getElementById('tw'),d=document.createElement('div');d.className=`toast ${type}`;d.textContent=msg;w.appendChild(d);setTimeout(()=>d.remove(),4500);}
function fmtB(b){if(b<1024)return b+'B';if(b<1048576)return Math.round(b/1024)+'KB';return(b/1048576).toFixed(1)+'MB';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

initAuth();
